<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test Vercel API</title>
</head>

<body>
    <h1>Test API Vercel</h1>
    <p>Ce test appelle directement l'API Vercel locale ou en ligne au lieu d'appeler Hugging Face.</p>
    <label>URL API (ex: https://delice-app-xxx.vercel.app/api/chat ou localhost): <input type="text" id="url"
            style="width: 400px;"></label>
    <br><br>
    <button onclick="testAPI()">Tester l'API Mettant 500</button>
    <pre id="output" style="background:#eee; padding:10px; margin-top:20px; white-space:pre-wrap;"></pre>

    <script>
        async function testAPI() {
            let url = document.getElementById('url').value;
            if (!url) {
                // Essayer de deviner l'URL de prod basé sur le bot
                url = "https://deliceapp.vercel.app/api/chat";
            }

            const output = document.getElementById('output');
            output.textContent = "Appel de " + url + " en cours...\n";

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: "Salut" }]
                    })
                });

                output.textContent += `Status Vercel: ${res.status}\n`;
                const text = await res.text();
                output.textContent += `Réponse Vercel: ${text.substring(0, 1000)}\n`;
            } catch (e) {
                output.textContent += `Erreur réseau: ${e.message}\n`;
            }
        }
    </script>
</body>

</html>
